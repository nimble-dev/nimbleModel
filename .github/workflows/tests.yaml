on:
  - push
  - pull_request

name: tests

jobs:
  CI:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release'}
          - {os: macOS-latest,   r: 'release'}
          - {os: ubuntu-24.04,   r: 'release', rspm: "https://packagemanager.rstudio.com/cran/__linux__/jammy/latest", image: "rocker/r2u:latest"}
          - {os: ubuntu-24.04,   r: 'devel',   rspm: "https://packagemanager.rstudio.com/cran/__linux__/jammy/latest", image: "rocker/r2u:latest"}

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RSPM: ${{ matrix.config.rspm }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install dependencies
        run: |
             install.packages('remotes')
             install.packages('R6')
             install.packages('nimble') # For now, we use `nimble` for stuff in `miscFunctions.R`.
             remotes::install_github("https://github.com/nimble-dev/nCompiler", subdir="nCompiler")
        shell: Rscript {0}

      - name: Install nimbleModel (Windows)
        if: runner.os == 'Windows'
        run: RCMD INSTALL --install-tests nimbleModel

      - name: Install nimbleModel
        if: runner.os != 'Windows'
        run: R CMD INSTALL --install-tests nimbleModel

      - name: Run tests
        run: |
             testthat::test_package('nimbleModel')
        shell: Rscript {0}

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: ${{ runner.os }}-r${{ matrix.config.r }}-results
          path: check
